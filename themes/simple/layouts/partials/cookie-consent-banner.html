<div id="cookie-consent-banner"
     class="fixed bottom-0 left-0 w-full bg-gray-900 text-white px-4 py-4 items-center justify-center z-50 shadow hidden">
    <span class="mr-5 text-sm">This website uses cookies for analytics. By clicking "Accept", you consent to their use.</span>
    <button id="accept-cookies"
            class="bg-white hover:bg-gray-100 text-gray-900 text-sm px-3 py-1 rounded border border-gray-300 transition">
        Accept
    </button>
</div>

<template id="gtm-head-template">
  {{ partial "gtm/head.html" . }}
</template>

<template id="gtm-body-template">
  {{ partial "gtm/body.html" . }}
</template>

<script type="text/javascript">
    const COOKIE_NAME = 'cookie_consent';
    const COOKIE_ACCEPTED_NAME = 'accepted';

    function checkConsent() {
        return localStorage.getItem(COOKIE_NAME) === COOKIE_ACCEPTED_NAME;
    }

    function loadGTM() {
        const gtmHeadTemplate = document.getElementById('gtm-head-template');
        if (gtmHeadTemplate) {
            document.head.insertAdjacentHTML('beforeend', gtmHeadTemplate.innerHTML);
        }

        const gtmBodyTemplate = document.getElementById('gtm-body-template');
        if (gtmBodyTemplate) {
            document.body.insertAdjacentHTML('afterbegin', gtmBodyTemplate.innerHTML);
        }
    }

    function showBanner() {
        const banner = document.getElementById('cookie-consent-banner');
        banner.classList.remove('hidden');
        banner.classList.add('flex');
    }

    function hideBanner() {
        const banner = document.getElementById('cookie-consent-banner');
        banner.classList.remove('flex');
        banner.classList.add('hidden');
    }

    document.addEventListener('DOMContentLoaded', function() {
        if (checkConsent()) {
            loadGTM();
        } else {
            showBanner();
            document.getElementById('accept-cookies').addEventListener('click', function() {
                localStorage.setItem(COOKIE_NAME, COOKIE_ACCEPTED_NAME);
                hideBanner();
                loadGTM();
            });
        }
    });
</script>
